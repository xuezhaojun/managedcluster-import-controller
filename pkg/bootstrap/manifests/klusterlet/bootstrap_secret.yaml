apiVersion: v1
kind: Secret
metadata:
  name: {{.BootstrapKubeconfig.SecretName}}
  {{if eq .InstallMode "Hosted"}}
  namespace: "klusterlet-{{ .ManagedClusterNamespace }}"
  {{ else }}
  namespace: "{{ .KlusterletNamespace }}"
  {{end}}
type: Opaque
data:
  kubeconfig: "{{ .BootstrapKubeconfig.Content }}"
{{- range $index, $element := .BootstrapKubeconfigs }}
---
apiVersion: v1
kind: Secret
metadata:
  name: "{{ $element.SecretName }}"
  namespace: "{{ $.KlusterletNamespace }}"
type: Opaque
data:
  kubeconfig: "{{ $element.Content }}"
{{- end }}